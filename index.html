<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">
    <title>Birthday Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* container */

        .container {
            position: absolute;
            top: 12%;
            width: 100%;
            text-align: center;
            color: #ffffff;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        /* birthday text */

        #title {
            font-size: 48px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 1.5s ease;
        }

        /* flowers */

        .flower {
            position: absolute;
            bottom: -100px;
            font-size: 28px;
            animation: flowerGrow linear infinite;
            transform: rotateX(45deg);
        }

        @keyframes flowerGrow {
            0% {
                transform: translateY(0) scale(0)
            }

            100% {
                transform: translateY(-900px) scale(1.6)
            }
        }

        /* hearts */

        .heart {
            position: absolute;
            font-size: 26px;
            filter: blur(2px);
            animation: heartFloat linear infinite;
        }

        @keyframes heartFloat {
            0% {
                transform: translateY(0) scale(.5)
            }

            100% {
                transform: translateY(-850px) scale(1.4)
            }
        }

        /* confetti */

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            animation: confettiFall linear infinite;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-20px) rotate(0)
            }

            100% {
                transform: translateY(900px) rotate(360deg)
            }
        }

        .continue-btn {
            margin-top: 50px;
            padding: 15px 40px;
            font-family: 'Fredoka One', cursive, Arial, sans-serif;
            font-size: 26px;
            color: white;
            background-color: #ff6b6b;
            border: 3px solid white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.6);
            animation: pulse 1.5s infinite;
            transition: transform 0.2s ease, background-color 0.2s;
        }

        .continue-btn:hover {
            transform: scale(1.1);
            background-color: #ff5252;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 4px 15px rgba(255, 107, 107, 0.6);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 4px 25px rgba(255, 107, 107, 0.9);
            }
        }

        #main-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
        }

        /* sparkles */

        .sparkle {
            position: absolute;
            font-size: 18px;
            animation: sparkleFloat linear infinite;
        }

        @keyframes sparkleFloat {
            0% {
                opacity: 0;
                transform: translateY(0) scale(.5)
            }

            50% {
                opacity: 1
            }

            100% {
                opacity: 0;
                transform: translateY(-700px) scale(1.3)
            }
        }

        /* slideshow layout */

        .slideshow {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 5;
        }

        .slideshow img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: scale(0.5);
            transition: all 1s ease;
        }

        /* fireworks canvas */

        #fireworks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* scene 3 */

        #scene3 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
            transition: opacity 2s ease;
            background-size: cover;
            background-position: center;
        }

        .scene3-asset {
            position: absolute;
            opacity: 0;
            transition: left 3s linear, right 4s linear, opacity 1.5s ease;
        }

        /* Removed table */

        #cartoon-girl {
            bottom: 3%;
            left: -350px;
            height: 600px;
            /* Matched to corner lamp size */
            width: auto;
            z-index: 15;
            /* Front of table */
        }

        #girl-popup {
            position: absolute;
            bottom: 600px;
            left: -350px;
            background: white;
            padding: 15px 25px;
            border-radius: 20px;
            font-family: 'Fredoka One', cursive;
            font-size: 24px;
            color: #d81b60;
            opacity: 0;
            z-index: 20;
            transition: opacity 1s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        #girl-popup::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50px;
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        #cartoon-cake {
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            opacity: 0;
            z-index: 12;
            /* On table */
        }

        #cartoon-boy {
            bottom: 3%;
            right: -350px;
            height: 620px;
            /* Matched to corner lamp size */
            width: auto;
            z-index: 15;
            /* Front of table */
            transform-origin: bottom center;
        }

        @keyframes walk {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            25% {
                transform: translateY(-10px) rotate(5deg);
            }

            50% {
                transform: translateY(0) rotate(0deg);
            }

            75% {
                transform: translateY(-10px) rotate(-5deg);
            }
        }

        .walking {
            animation: walk 0.5s infinite;
        }

        .falling-sprinkle {
            position: absolute;
            top: -20px;
            width: 8px;
            height: 20px;
            border-radius: 4px;
            animation: fall 3s linear forwards;
            z-index: 20;
        }

        .falling-balloon {
            position: absolute;
            top: -120px;
            width: 50px;
            animation: fall 4s ease-in forwards;
            z-index: 20;
        }

        @keyframes fall {
            to {
                transform: translateY(120vh) rotate(360deg);
                opacity: 0;
            }
        }

        #party-guests {
            bottom: 20%;
            width: 100%;
            text-align: center;
            opacity: 0;
            display: flex;
            justify-content: space-around;
        }

        .guest {
            width: 120px;
        }

        /* scene 4 */

        #scene4 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
            transition: opacity 2s ease;
            background-image: url('photo04.jpg');
            /* You can change this image later */
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: scroll;
            /* Scroll is generally safer for mobile backgrounds */
        }

        #scene4-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            /* Darken bg so text is readable */
        }

        #letter-container {
            position: absolute;
            top: 10%;
            left: 5%;
            width: 90%;
            height: 80%;
            font-family: 'Indie Flower', cursive;
            font-size: 28px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            line-height: 1.6;
            overflow-y: auto;
            text-align: left;
        }

        .letter-line {
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease;
            margin-bottom: 15px;
        }

        .next-scene-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 25px;
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            color: white;
            background-color: #4a154b;
            border: 2px solid white;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100;
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        @media (max-width: 768px) {
            .slideshow {
                position: relative;
                /* Break absolute positioning that causes overlap */
                bottom: 10%;
                display: block;
                /* Standard top-to-bottom layout */
                width: 100%;
                text-align: center;
                height: 60vh;
                overflow-y: scroll;
            }

            .slideshow img {
                display: block;
                width: 70%;
                margin: 0 auto 20px auto;
                /* Center with space bottom */
                aspect-ratio: 1 / 1;
            }

            #cartoon-girl {
                height: 350px;
                left: -350px;
                /* Keep offscreen start */
            }

            #cartoon-boy {
                height: 360px;
                right: -350px;
                /* Keep offscreen start */
            }

            #girl-popup {
                bottom: 380px;
                padding: 10px 15px;
                font-size: 16px;
                left: -350px;
                /* Keep offscreen start */
            }
        }
    </style>

</head>

<body>

    <div id="intro-screen">
        <div id="intro-text"></div>
        <button id="start-btn" class="continue-btn">CLICK HERE 🎁</button>
    </div>

    <div id="main-content">
        <div class="container">
            <h1 id="title">Happy Birthday Mayu 🎂</h1>
        </div>

        <!-- Photo slideshow -->

        <div class="slideshow">
            <img src="photo01.jpg">
            <img src="photo02.jpg">
            <img src="photo03.jpg">
            <img src="photo04.jpg">
        </div>

        <!-- Music (Autoplay starts on click for better browser support) -->
        <audio id="bg-music" loop>
            <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b2a1f5f7.mp3" type="audio/mpeg">
        </audio>

        <!-- Fireworks canvas -->

        <canvas id="fireworks"></canvas>

        <button id="to-scene3-btn" class="next-scene-btn">Next Surprise ➜</button>
    </div>

    <!-- Scene 3: Cartoon Film -->
    <div id="scene3" style="background-image: url('cartoon_hall.png');">

        <div id="girl-popup" class="scene3-asset">Happy Birthday! 🎉</div>
        <img id="cartoon-girl" class="scene3-asset" src="cartoon_girl.png" style="opacity:1;">

        <img id="cartoon-cake" class="scene3-asset"
            src="https://cdn.pixabay.com/photo/2013/07/12/19/31/birthday-cake-154086_1280.png">

        <img id="cartoon-boy" class="scene3-asset" src="cartoon_boy.png" style="opacity:1;">

        <div id="party-guests" class="scene3-asset">
            <img class="guest" src="https://cdn.pixabay.com/photo/2017/01/31/15/33/boy-2025164_1280.png">
            <img class="guest" src="https://cdn.pixabay.com/photo/2017/01/31/15/33/girl-2025170_1280.png">
            <img class="guest" src="https://cdn.pixabay.com/photo/2013/07/13/10/06/girl-156555_1280.png">
        </div>

        <button id="to-scene4-btn" class="next-scene-btn" style="bottom: 50px; right: 50px;">Next ➜</button>

        <audio id="birthday-song" src="my_song.mp3"></audio>

    </div>

    <!-- Scene 4: The Letter -->
    <div id="scene4">
        <div id="scene4-overlay"></div>
        <div id="letter-container">
            <!-- Text goes here line by line -->
        </div>
    </div>

    <script>

        /* intro screen logic */
        const introTextStr = "Hi......! There is a small surprise to u ..... ✨";
        const introTextContainer = document.getElementById("intro-text");
        const colors = ['#1a365d', '#c53030', '#319795', '#dd6b20', '#4a154b'];

        introTextStr.split(' ').forEach(word => {
            let wordDiv = document.createElement('div');
            wordDiv.style.whiteSpace = 'nowrap';
            wordDiv.style.display = 'inline-block';
            word.split('').forEach(char => {
                let span = document.createElement("span");
                span.className = "letter";
                span.innerText = char;
                span.style.color = colors[Math.floor(Math.random() * colors.length)];
                span.style.transform = `rotate(${(Math.random() - 0.5) * 20}deg) translateY(${(Math.random() - 0.5) * 10}px)`;
                wordDiv.appendChild(span);
            });
            introTextContainer.appendChild(wordDiv);
            let spaceDiv = document.createElement('div');
            spaceDiv.className = 'word-space';
            introTextContainer.appendChild(spaceDiv);
        });

        document.getElementById("start-btn").addEventListener("click", function (e) {
            e.stopPropagation();
            let screen = document.getElementById("intro-screen");
            screen.style.opacity = '0';
            setTimeout(() => {
                screen.style.display = 'none';
            }, 1000);

            let mainContent = document.getElementById("main-content");
            mainContent.style.opacity = '1';
            mainContent.style.pointerEvents = 'auto';

            document.getElementById("bg-music").play();

            startSurprise();
        });

        function startSurprise() {

            /* show birthday text */

            setTimeout(() => {
                let t = document.getElementById("title");
                t.style.opacity = 1;
                t.style.transform = "scale(1)";
            }, 2000);


            /* flowers */

            for (let i = 0; i < 20; i++) {
                let flower = document.createElement("div");
                flower.className = "flower";
                flower.innerHTML = "🌸";

                flower.style.left = Math.random() * 100 + "%";
                flower.style.animationDuration = (4 + Math.random() * 4) + "s";

                document.body.appendChild(flower);
            }


            /* hearts */

            for (let i = 0; i < 15; i++) {
                let heart = document.createElement("div");
                heart.className = "heart";
                heart.innerHTML = "❤️";

                heart.style.left = Math.random() * 100 + "%";
                heart.style.animationDuration = (5 + Math.random() * 3) + "s";

                document.body.appendChild(heart);
            }


            /* confetti */

            let colors = ["red", "yellow", "blue", "green", "pink", "orange"];

            for (let i = 0; i < 50; i++) {
                let confetti = document.createElement("div");
                confetti.className = "confetti";

                confetti.style.left = Math.random() * 100 + "%";
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (3 + Math.random() * 3) + "s";

                document.body.appendChild(confetti);
            }


            /* sparkles */

            for (let i = 0; i < 25; i++) {
                let sparkle = document.createElement("div");
                sparkle.className = "sparkle";
                sparkle.innerHTML = "✨";

                sparkle.style.left = Math.random() * 100 + "%";
                sparkle.style.animationDuration = (4 + Math.random() * 3) + "s";

                document.body.appendChild(sparkle);
            }


            /* slideshow animation (one by one fade in) */

            let slides = document.querySelectorAll(".slideshow img");

            slides.forEach((img, index) => {
                setTimeout(() => {
                    img.style.opacity = 1;
                    img.style.transform = "scale(1)";
                }, 3000 + (index * 1500)); // Start after text finishes, delay each image
            });

            // Show transition button after all slides are visible
            setTimeout(() => {
                let toScene3 = document.getElementById("to-scene3-btn");
                toScene3.style.display = 'block';
                setTimeout(() => toScene3.style.opacity = '1', 100);
            }, 3000 + (slides.length * 1500) + 1000);


            /* fireworks */

            const canvas = document.getElementById("fireworks");
            const ctx = canvas.getContext("2d");

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];

            function createFirework() {

                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height / 2;

                for (let i = 0; i < 50; i++) {

                    particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        life: 60
                    });

                }

            }

            function updateFireworks() {

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particles.forEach((p, index) => {

                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;

                    ctx.fillStyle = "yellow";
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                    ctx.fill();

                    if (p.life <= 0) {
                        particles.splice(index, 1);
                    }

                });

                requestAnimationFrame(updateFireworks);

            }

            setInterval(createFirework, 2000);
            updateFireworks();

        } // end startSurprise

        /* Scene 2 to Scene 3 Transition */
        document.getElementById("to-scene3-btn").addEventListener("click", function () {
            let mainContent = document.getElementById("main-content");
            mainContent.style.opacity = '0';

            // Stop first bg music
            let bgMusic = document.getElementById("bg-music");
            bgMusic.pause();

            setTimeout(() => {
                mainContent.style.display = 'none';
                startScene3();
            }, 2000);
        });

        /* Scene 3 Logic */
        function startScene3() {
            let scene3 = document.getElementById("scene3");
            scene3.style.display = 'block';
            setTimeout(() => scene3.style.opacity = '1', 100);

            // Timeline of events

            // 1. Girl brings cake to the table (walks from left)
            setTimeout(() => {
                let girl = document.getElementById("cartoon-girl");
                let popup = document.getElementById("girl-popup");
                girl.classList.add("walking");

                // On mobile, walk to 10%. On desktop, walk to 30%.
                let isMobile = window.innerWidth <= 768;
                girl.style.left = isMobile ? "10%" : "30%";
                popup.style.left = isMobile ? "12%" : "32%";

                setTimeout(() => girl.classList.remove("walking"), 3000);
            }, 2000);

            // 2. Girl puts cake on table
            setTimeout(() => {
                let cake = document.getElementById("cartoon-cake");
                cake.style.opacity = "1";
            }, 5000);

            // 3. Boy arrives
            setTimeout(() => {
                let boy = document.getElementById("cartoon-boy");
                boy.classList.add("walking");

                // On mobile, walk to 5%. On desktop, walk to 15%.
                let isMobile = window.innerWidth <= 768;
                boy.style.right = isMobile ? "-5%" : "15%";

                // Play audio as soon as boy starts arriving
                let bdaySong = document.getElementById("birthday-song");
                bdaySong.play();

                setTimeout(() => boy.classList.remove("walking"), 4000);
            }, 6000);

            // 4. Girl says Happy Birthday
            setTimeout(() => {
                let popup = document.getElementById("girl-popup");
                popup.style.opacity = "1";
            }, 9000);

            // 5. Boy "cuts" the cake
            setTimeout(() => {
                let boy = document.getElementById("cartoon-boy");
                boy.style.transition = "transform 0.5s ease";
                boy.style.transform = "translateY(-50px) rotate(-10deg)";
                setTimeout(() => boy.style.transform = "translateY(0px) rotate(0deg)", 500);
                setTimeout(() => {
                    boy.style.transform = "translateY(-50px) rotate(-10deg)";
                    setTimeout(() => boy.style.transform = "translateY(0px) rotate(0deg)", 500);

                    // Sprinkle effects right after cutting
                    createFallingParty();
                }, 1000);
            }, 10500);

            // 6. Guests appear
            setTimeout(() => {
                let guests = document.getElementById("party-guests");
                guests.style.opacity = "1";
            }, 13000);

            // 7. Show Next button for Screen 4
            setTimeout(() => {
                let nextBtn = document.getElementById("to-scene4-btn");
                nextBtn.style.display = "block";
                setTimeout(() => nextBtn.style.opacity = "1", 100);
            }, 16000);
        }

        function createFallingParty() {
            let container = document.getElementById("scene3");
            const colors = ['#f44336', '#2196f3', '#4caf50', '#ffeb3b', '#e91e63', '#9c27b0'];

            for (let i = 0; i < 80; i++) {
                let sprinkle = document.createElement("div");
                sprinkle.className = "falling-sprinkle";
                sprinkle.style.left = Math.random() * 100 + "%";
                sprinkle.style.background = colors[Math.floor(Math.random() * colors.length)];
                sprinkle.style.animationDuration = (2 + Math.random() * 3) + "s";
                sprinkle.style.animationDelay = (Math.random() * 1) + "s";
                container.appendChild(sprinkle);
            }

            let balloonImages = [
                'https://cdn.pixabay.com/photo/2013/07/12/13/28/balloon-147059_1280.png',
                'https://cdn.pixabay.com/photo/2013/07/13/10/24/balloon-157177_1280.png',
                'https://cdn.pixabay.com/photo/2013/07/13/10/24/balloon-157174_1280.png'
            ];
            for (let i = 0; i < 15; i++) {
                let b = document.createElement("img");
                b.src = balloonImages[i % balloonImages.length];
                b.className = "falling-balloon";
                b.style.left = Math.random() * 100 + "%";
                b.style.animationDuration = (3 + Math.random() * 2) + "s";
                b.style.animationDelay = (Math.random() * 1) + "s";
                container.appendChild(b);
            }
        }

        /* Scene 3 to Scene 4 Transition */
        document.getElementById("to-scene4-btn").addEventListener("click", function () {
            let scene3 = document.getElementById("scene3");
            scene3.style.opacity = '0';

            // Optional: stop birthday song
            let bdaySong = document.getElementById("birthday-song");
            // bdaySong.pause(); 

            setTimeout(() => {
                scene3.style.display = 'none';
                startScene4();
            }, 2000);
        });

        /* Scene 4 Logic */
        let finalLetterLines = [
            "Dear Mayu,",
            "Happy Birthday to a very special person in my life! 🎉",
            "Thank you for always supporting me, caring for me, and standing by my side no matter what.",
            "Your kindness, strength, and encouragement mean so much to me.",
            "I’m really grateful to have someone like you.",
            "",
            "Wishing you a day full of happiness, success, and all the things that make you smile.",
            "Always stay happy in ur life and successfull in every step of life.",
            "May this year bring you lots of joy and amazing moments. 🎂✨! 💕"
        ];

        function startScene4() {
            let scene4 = document.getElementById("scene4");
            scene4.style.display = 'block';
            setTimeout(() => scene4.style.opacity = '1', 100);

            let container = document.getElementById("letter-container");
            container.innerHTML = "";

            // Animate text line by line
            finalLetterLines.forEach((textLine, index) => {
                let p = document.createElement("div");
                p.className = "letter-line";
                p.innerText = textLine;
                container.appendChild(p);

                setTimeout(() => {
                    p.style.opacity = "1";
                    p.style.transform = "translateY(0)";
                }, 1500 + (index * 2000)); // Wait 1.5s the show each line every 2s
            });
        }

    </script>

</body>

</html>
